# Optional local hooks that run the linters before each commit.
#
# One-time setup per clone:
#   pip install pre-commit
#   pre-commit install
#
# After that, ruff (lint, with auto-fix) and codespell run automatically on the
# files you stage. If a hook rewrites a file, the commit is aborted so you can
# review, re-stage, and commit again. These are the same checks the Lint
# workflow enforces in CI, so running them locally keeps PRs green.
#
# https://pre-commit.com
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        additional_dependencies: [tomli]
