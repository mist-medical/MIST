name: Publish Docker Images

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Upload Python Package]
    types: [completed]

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Extract and transform version from pyproject.toml
        run: |
          VERSION=$(grep -m 1 version ./pyproject.toml | tr -s ' ' | tr -d '"' | tr -d "'" | cut -d' ' -f3)
          DOCKER_VERSION=$(echo $VERSION | sed 's/-alpha/a0/' | sed 's/-beta/b0/' | sed 's/-rc/rc0/')
          echo "DOCKER_VERSION=$DOCKER_VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # PYTORCH_IMAGE is intentionally not overridden here so the base image
          # stays pinned in a single place: the ARG default in ./Dockerfile
          # (torch 2.9.1). torch 2.11.0 crashes multi-GPU DDP startup, so do not
          # bump the base image from this workflow.
          push: true
          tags: |
            mistmedical/mist:${{ env.DOCKER_VERSION }}
            mistmedical/mist:latest
